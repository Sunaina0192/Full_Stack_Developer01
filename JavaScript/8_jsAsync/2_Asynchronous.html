haan, JavaScript single-threaded hoti hai, matlab ek time pe ek hi kaam kar sakti hai.
Lekin async features (jaise setTimeout, API calls) background me chal jaate hain, aur JS apna baaki code continue karti hai — wait nahi karti.

short me:

<!-- English:
"Asynchronous" means things don’t happen at the same time — JavaScript doesn’t wait for one task to finish before starting another.

Hinglish:
“Asynchronous” ka matlab hota hai — ek kaam ke khatam hone ka wait na karna.
JS agla kaam start kar deta hai, jab tak pehla complete ho raha hota hai. -->
